services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_USER: zoneweaver_user
      POSTGRES_PASSWORD: X0d03ZqLnE7qOSFruzRl1MI78qtzyKUw
      POSTGRES_DB: zoneweaver
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoneweaver"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zoneweaver
    command: PGPASSWORD=X0d03ZqLnE7qOSFruzRl1MI78qtzyKUw psql -h dpg-d80ufmt7vvec73ej8cfg-a.oregon-postgres.render.com -U zoneweaver_user zoneweaver

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://zoneweaver_user:X0d03ZqLnE7qOSFruzRl1MI78qtzyKUw@dpg-d80ufmt7vvec73ej8cfg-a.oregon-postgres.render.com/zoneweaver
      SECRET_KEY: your-change-me-secret-key-minimum-32-characters-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      H3_DEFAULT_RESOLUTION: 13
      MAX_ZONES_TOTAL: 3
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - zoneweaver
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # pgAdmin for GUI database management
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - zoneweaver

volumes:
  postgres_data:

networks:
  zoneweaver:
    driver: bridge